<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kotoba Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/src/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: "#ae2f34",
          "primary-container": "#ff6b6b",
          "on-primary": "#ffffff",
          "on-surface": "#151546",
          "on-surface-variant": "#584140",
          surface: "#fcf8ff",
          "surface-container": "#eeecff",
        },
        fontFamily: {
          jp: ["Noto Sans JP", "sans-serif"],
        },
      },
    },
  };
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings:
      "FILL" 0,
      "wght" 400,
      "GRAD" 0,
      "opsz" 24;
  }
</style>
</head>
<body class="font-jp bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 relative">

  <!-- Decorative animated background -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Generate sentences button -->
  <button
    id="generateBtn"
    aria-label="Generate Sentences"
    class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container text-primary text-sm font-bold shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95"
  >
    <span id="generateBtnIcon" class="material-symbols-outlined text-[20px]">auto_awesome</span>
    <span id="generateBtnText" >Generate</spani>
  </button>

  <!-- Right-side action buttons -->
  <div class="fixed top-8 right-8 z-50 flex flex-col gap-3">
    <!-- Add word button -->
    <button
      id="addBtn"
      aria-label="Add Word"
      class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container text-primary shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95"
    >
      <span class="material-symbols-outlined text-[24px]">add</span>
    </button>

    <!-- List word button -->
    <button
      id="listBtn"
      aria-label="Show Word List"
      class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container text-primary shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95"
    >
      <span class="material-symbols-outlined text-[24px]">format_list_bulleted</span>
    </button>
  </div>

  <!-- Add Word Modal -->
  <div id="addModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="relative w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="glass-card p-6 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] bg-surface-container/90 backdrop-blur-sm w-full">
        <div class="flex justify-between items-start mb-4">
          <h2 class="text-xl font-bold text-primary">Add Word</h2>
          <button id="closeModalBtn" class="text-text-primary hover:text-primary-container hover:bg-primary-hover hover:text-on-primary">
            ✕
          </button>
        </div>
        <form id="addWordForm" class="space-y-4">
          <div>
            <label for="wordInput" class="block text-sm font-medium mb-1 text-on-surface">Reading (Hiragana/Katakana)</label>
            <input id="wordInput" name="wordInput" type="text" class="w-full px-4 py-2 bg-surface/80 border border-on-surface-variant/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="あたらしいほん">
          </div>
        </form>
        <div class="mt-6 flex justify-end">
          <button form="addWordForm" type="submit" id="saveWordBtn" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-medium hover:bg-primary-container hover:text-white transition-colors">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- List Word Modal -->
  <div id="listModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="relative w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="glass-card p-6 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] bg-surface-container/90 backdrop-blur-sm w-full">
        <div class="flex justify-between items-start mb-4">
          <h2 class="text-xl font-bold text-primary">Word List</h2>
          <button id="closeListModalBtn" class="text-text-primary hover:text-primary-container hover:bg-primary-hover hover:text-on-primary">
            ✕
          </button>
        </div>
        <div id="wordsListContainer" class="space-y-2">
          <div class="flex items-start">
            <span class="flex-shrink-0 w-5 text-primary font-medium">1.</span>
            <span class="flex-grow">りんご</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-5 text-primary font-medium">2.</span>
            <span class="flex-grow">バナナ</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-5 text-primary font-medium">3.</span>
            <span class="flex-grow">チェリー</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-5 text-primary font-medium">4.</span>
            <span class="flex-grow">みかん</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-5 text-primary font-medium">5.</span>
            <span class="flex-grow">ぶどう</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main class="relative z-10 w-full max-w-[900px] flex flex-col items-center gap-12 px-6">
    <div
      id="card"
      class="glass-card w-full px-10 py-14 md:px-16 md:py-16 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] flex flex-col items-center text-center transition-all duration-300"
      style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
    >
      <h1 id="sentenceText" class="text-3xl md:text-[44px] font-bold leading-snug tracking-tight">
        昨日は図書館で<span class="sentence-highlight text-primary">新しい本</span>を読みました。
      </h1>
    </div>

    <button
      id="shuffleBtn"
      class="hover-bounce flex items-center gap-3 px-10 py-5 bg-primary text-on-primary rounded-full text-xl font-bold shadow-[0_8px_24px_rgba(174,47,52,0.3)] transition-transform active:scale-90"
    >
      <span id="shuffleIcon" class="material-symbols-outlined text-[30px]">refresh</span>
      <span>Shuffle</span>
    </button>
  </main>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col items-center gap-2 pointer-events-none"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
