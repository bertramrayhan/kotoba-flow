<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bunmix</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/src/style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: "#ae2f34",
          "primary-container": "#ff6b6b",
          "on-primary": "#ffffff",
          "on-surface": "#151546",
          "on-surface-variant": "#584140",
          surface: "#fcf8ff",
          "surface-container": "#eeecff",
        },
        fontFamily: {
          jp: ["Noto Sans JP", "sans-serif"],
        },
      },
    },
  };
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings:
      "FILL" 0,
      "wght" 400,
      "GRAD" 0,
      "opsz" 24;
  }
</style>
</head>
<body class="font-jp bg-surface text-on-surface min-h-screen flex items-center justify-center p-4 relative">

  <!-- Decorative animated background -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Generate sentences button -->
  <button
    id="generateBtn"
    aria-label="Generate Sentences"
    class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2 sm:px-6 sm:py-3 rounded-full bg-surface-container text-primary text-sm font-bold shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95 sm:text-base"
  >
    <span id="generateBtnIcon" class="material-symbols-outlined text-[18px] sm:text-[20px]">auto_awesome</span>
    <span id="generateBtnText" class="whitespace-nowrap">Generate</span>
  </button>

  <!-- Right-side action buttons -->
  <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 sm:top-8 sm:right-8 sm:gap-3">
    <!-- Add word button -->
    <button
      id="addBtn"
      aria-label="Add Word"
      class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full bg-surface-container text-primary shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95"
    >
      <span class="material-symbols-outlined text-[20px] sm:text-[24px]">add</span>
    </button>

    <!-- List word button -->
    <button
      id="listBtn"
      aria-label="Show Word List"
      class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full bg-surface-container text-primary shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95"
    >
      <span class="material-symbols-outlined text-[20px] sm:text-[24px]">format_list_bulleted</span>
    </button>
    <button
      id="apiKeyBtn"
      aria-label="Set API Key"
      class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full bg-surface-container text-primary shadow-lg hover:bg-primary-container hover:text-white transition-all active:scale-95"
    >
      <span class="material-symbols-outlined text-[20px] sm:text-[24px]">key</span>
    </button>
  </div>

  <!-- Add Word Modal -->
  <div id="addModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="relative w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="glass-card p-4 sm:p-6 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] bg-surface-container/90 backdrop-blur-sm w-full">
        <div class="flex justify-between items-start mb-3 sm:mb-4">
          <h2 class="text-lg font-bold text-primary sm:text-xl">Add Word</h2>
          <button id="closeModalBtn" class="text-text-primary hover:text-primary-container hover:bg-primary-hover hover:text-on-primary">
            ✕
          </button>
        </div>
        <form id="addWordForm" class="space-y-3 sm:space-y-4">
          <div>
            <label for="wordInput" class="block text-sm font-medium mb-1 text-on-surface">Reading (Hiragana/Katakana)</label>
            <input id="wordInput" name="wordInput" type="text" class="w-full px-3 py-2 sm:px-4 sm:py-2 bg-surface/80 border border-on-surface-variant/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="あたらしいほん">
          </div>
        </form>
        <div class="mt-4 sm:mt-6 flex justify-end">
          <button form="addWordForm" type="submit" id="saveWordBtn" class="px-4 py-2 sm:px-6 sm:py-3 bg-primary text-on-primary rounded-lg font-medium hover:bg-primary-container hover:text-white transition-colors">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- List Word Modal -->
  <div id="listModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="relative w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="glass-card p-4 sm:p-6 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] bg-surface-container/90 backdrop-blur-sm w-full">
        <div class="flex justify-between items-start mb-3 sm:mb-4">
          <h2 class="text-lg font-bold text-primary sm:text-xl">Word List</h2>
          <button id="closeListModalBtn" class="text-text-primary hover:text-primary-container hover:bg-primary-hover hover:text-on-primary">
            ✕
          </button>
        </div>
        <div id="wordsListContainer" class="space-y-2 sm:space-y-3">
          <div class="flex items-start">
            <span class="flex-shrink-0 w-4 sm:w-5 text-primary font-medium">1.</span>
            <span class="flex-grow">りんご</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-4 sm:w-5 text-primary font-medium">2.</span>
            <span class="flex-grow">バナナ</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-4 sm:w-5 text-primary font-medium">3.</span>
            <span class="flex-grow">チェリー</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-4 sm:w-5 text-primary font-medium">4.</span>
            <span class="flex-grow">みかん</span>
          </div>
          <div class="flex items-start">
            <span class="flex-shrink-0 w-4 sm:w-5 text-primary font-medium">5.</span>
            <span class="flex-grow">ぶどう</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- API Key Modal -->
  <div id="apiKeyModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="relative w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="glass-card p-4 sm:p-6 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] bg-surface-container/90 backdrop-blur-sm w-full">
        <div class="flex justify-between items-start mb-3 sm:mb-4">
          <h2 class="text-lg font-bold text-primary sm:text-xl">API Key</h2>
          <button id="closeApiKeyModalBtn" class="text-text-primary hover:text-primary-container hover:bg-primary-hover hover:text-on-primary">
            ✕
          </button>
        </div>
        <form id="apiKeyForm" class="space-y-3 sm:space-y-4">
          <div>
            <label for="apiKeyInput" class="block text-sm font-medium mb-1 text-on-surface">Your Gemini API Key</label>
            <input
              id="apiKeyInput"
              name="apiKeyInput"
              type="password"
              autocomplete="new-password"
              data-lpignore="true"
              data-form-type="other"
              class="w-full px-3 py-2 sm:px-4 sm:py-2 bg-surface/80 border border-on-surface-variant/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
              placeholder="AIzaSy..."
            />
            <p class="text-xs sm:text-sm text-on-surface-variant opacity-60 mt-1">
              Stored only in your browser. Never sent anywhere except to generate your sentences.
            </p>
          </div>
        </form>
        <div class="mt-4 sm:mt-6 flex justify-end">
          <button form="apiKeyForm" type="submit" id="saveApiKeyBtn" class="px-4 py-2 sm:px-6 sm:py-3 bg-primary text-on-primary rounded-lg font-medium hover:bg-primary-container hover:text-white transition-colors">
            Save
          </button>
        </div>
      </div>
    </div>
  </div>

  <main class="relative z-10 w-full max-w-[900px] flex flex-col items-center gap-6 px-4 sm:px-6">
    <div
      id="card"
      class="glass-card w-full px-4 sm:px-6 py-6 sm:py-8 md:px-8 md:py-10 rounded-[48px] shadow-[0_24px_48px_rgba(174,47,52,0.12)] flex flex-col items-center text-center transition-all duration-300"
      style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
    >
      <h1 id="sentenceText" class="text-base sm:text-lg md:text-xl lg:text-2xl font-bold leading-snug tracking-tight">
        昨日はあめがふったので、うちでほんをよみました。
      </h1>
    </div>

    <button
      id="shuffleBtn"
      class="hover-bounce flex items-center gap-2 px-4 sm:px-6 py-3 sm:py-4 bg-primary text-on-primary rounded-full text-sm sm:text-lg font-bold shadow-[0_8px_24px_rgba(174,47,52,0.3)] transition-transform active:scale-90"
    >
      <span id="shuffleIcon" class="material-symbols-outlined text-[20px] sm:text-[24px]">refresh</span>
      <span class="whitespace-nowrap">Shuffle</span>
    </button>
  </main>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed top-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col items-center gap-2 sm:top-6 pointer-events-none"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
